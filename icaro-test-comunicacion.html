<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Proyecto Ícaro — Test Comunicación</title>
<meta name="theme-color" content="#08080f">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080f;--surface:rgba(255,255,255,0.05);--surface2:rgba(255,255,255,0.08);
--surface3:rgba(255,255,255,0.12);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
--text:#eaeaf2;--dim:#7a7a96;--mid:#a0a0b8;--accent:#6366f1;--accent2:#818cf8;
--aglow:rgba(99,102,241,0.35);--green:#34d399;--gglow:rgba(52,211,153,0.25);
--red:#f87171;--rglow:rgba(248,113,113,0.25);--orange:#fbbf24;--cyan:#22d3ee;
--rad:16px;--radsm:12px}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
min-height:100dvh;-webkit-tap-highlight-color:transparent}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg span{position:absolute;border-radius:50%;filter:blur(90px);opacity:.25}
.bg .b1{width:300px;height:300px;background:var(--accent);top:-80px;left:-60px;animation:fl 14s ease-in-out infinite alternate}
.bg .b2{width:240px;height:240px;background:#e11d48;bottom:15%;right:-60px;animation:fl 18s ease-in-out infinite alternate-reverse}
@keyframes fl{0%{transform:translate(0,0) scale(1)}100%{transform:translate(20px,25px) scale(1.1)}}
.app{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:14px 14px 24px}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:4px 0 14px}
.hdr h1{flex:1;font-size:18px;font-weight:800;
background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.conn-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;
background:var(--surface2);border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:500}
.conn-chip:active{transform:scale(.96)}
.dot{width:8px;height:8px;border-radius:50%}
.dot.off{background:var(--red);box-shadow:0 0 6px var(--rglow)}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--gglow);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Cards */
.card{background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border:1px solid var(--border);border-radius:var(--rad);padding:16px;margin-bottom:12px}
.ch{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;
color:var(--dim);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ch .d{width:6px;height:6px;border-radius:50%;background:var(--accent)}

/* Mode Toggle */
.mode-toggle{display:flex;border-radius:var(--radsm);overflow:hidden;border:1px solid var(--border);margin-bottom:12px}
.mode-btn{flex:1;padding:12px 8px;text-align:center;font-family:'Outfit';font-size:13px;
font-weight:600;background:var(--surface2);border:none;color:var(--dim);cursor:pointer;transition:all .15s}
.mode-btn.active{background:rgba(99,102,241,.15);color:var(--accent2)}
.mode-btn:first-child{border-right:1px solid var(--border)}

/* Info box */
.info{font-size:12px;color:var(--mid);line-height:1.6;padding:12px;border-radius:var(--radsm);
background:var(--surface2);margin-bottom:12px}
.info strong{color:var(--text)}
.info.warn{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.15)}
.info.ok{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.15)}

/* Status */
.status-bar{text-align:center;padding:10px;font-size:13px;font-weight:600;
border-radius:var(--radsm);margin-bottom:12px}
.status-bar.listening{background:rgba(52,211,153,.1);color:var(--green)}
.status-bar.sending{background:rgba(34,211,238,.1);color:var(--cyan)}
.status-bar.idle{background:var(--surface2);color:var(--dim)}

/* Chat area */
.chat{max-height:200px;overflow-y:auto;margin-bottom:12px;padding:4px 0}
.msg{display:flex;margin-bottom:8px;animation:mi .25s ease}
@keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.sent{justify-content:flex-end}
.msg.recv{justify-content:flex-start}
.msg.sys{justify-content:center}
.bubble{max-width:85%;padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.4;word-break:break-word}
.msg.sent .bubble{background:#1e3a5f;border-bottom-right-radius:4px;color:#c5ddf5}
.msg.recv .bubble{background:#2d1b4e;border-bottom-left-radius:4px;color:#dcc5f0}
.msg.sys .bubble{background:var(--surface2);color:var(--dim);font-size:11px;border-radius:20px;padding:4px 12px}
.bubble .time{display:block;font-size:9px;color:var(--dim);margin-top:3px;text-align:right}

/* Input */
.input-row{display:flex;gap:8px;margin-bottom:12px}
.input-row input{flex:1;padding:10px 14px;border-radius:var(--radsm);background:var(--surface2);
border:1px solid var(--border);color:var(--text);font-family:'Outfit';font-size:14px;outline:none}
.input-row input:focus{border-color:rgba(99,102,241,.4)}
.send-btn{width:44px;height:44px;border-radius:12px;border:none;
background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:18px;
cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:active{transform:scale(.93)}
.send-btn:disabled{opacity:.3;pointer-events:none}

/* Counter */
.counters{display:flex;gap:12px;margin-bottom:12px}
.counter{flex:1;text-align:center;padding:10px;border-radius:var(--radsm);background:var(--surface2);border:1px solid var(--border)}
.counter .label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-weight:600}
.counter .val{font-size:22px;font-weight:800;margin-top:4px}
.counter .val.green{color:var(--green)}.counter .val.red{color:var(--red)}.counter .val.cyan{color:var(--cyan)}

/* Quick tests */
.quick-tests{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.qt-btn{padding:10px;border-radius:var(--radsm);background:var(--surface2);border:1px solid var(--border);
font-family:'Outfit';font-size:12px;font-weight:600;color:var(--mid);cursor:pointer;
text-align:center;transition:all .15s}
.qt-btn:active{transform:scale(.96);background:var(--surface3)}
.qt-btn:disabled{opacity:.3;pointer-events:none}

/* Log */
.log{background:rgba(0,0,0,.3);border-radius:var(--radsm);padding:10px;
font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.7;
max-height:200px;overflow-y:auto;color:var(--dim)}
.log .ok{color:var(--green)}.log .err{color:var(--red)}
.log .warn{color:var(--orange)}.log .info{color:var(--cyan)}

/* Buttons */
.btn{width:100%;padding:12px;border:none;border-radius:var(--radsm);font-family:'Outfit';
font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;
align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.3;pointer-events:none}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);
background:var(--surface3);backdrop-filter:blur(20px);border:1px solid var(--border2);
border-radius:12px;padding:8px 18px;font-size:12px;font-weight:500;color:var(--text);
z-index:200;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bg"><span class="b1"></span><span class="b2"></span></div>

<div class="app">
  <div class="hdr">
    <h1>🔬 Test Comunicación</h1>
    <div class="conn-chip" onclick="toggleConnection()">
      <span class="dot off" id="connDot"></span>
      <span id="connText">Conectar</span>
    </div>
  </div>

  <!-- Mode Toggle -->
  <div class="card">
    <div class="ch"><span class="d"></span> Modo de comunicación</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeCable" onclick="setMode('cable')">🔌 Cable directo</button>
      <button class="mode-btn" id="modeIR" onclick="setMode('ir')">📡 Infrarrojo (IR)</button>
    </div>
    <div class="info" id="modeInfo"></div>
  </div>

  <!-- Status -->
  <div class="status-bar idle" id="statusBar">Conecta el dongle</div>

  <!-- Counters -->
  <div class="counters">
    <div class="counter"><div class="label">Enviados</div><div class="val cyan" id="cntTx">0</div></div>
    <div class="counter"><div class="label">Recibidos</div><div class="val green" id="cntRx">0</div></div>
    <div class="counter"><div class="label">Errores</div><div class="val red" id="cntErr">0</div></div>
  </div>

  <!-- Quick Tests -->
  <div class="card">
    <div class="ch"><span class="d"></span> Tests rápidos</div>
    <div class="quick-tests">
      <button class="qt-btn" id="qt1" disabled onclick="quickSend('Hola')">👋 Enviar "Hola"</button>
      <button class="qt-btn" id="qt2" disabled onclick="quickSend('PING')">🏓 Enviar PING</button>
      <button class="qt-btn" id="qt3" disabled onclick="quickSend('ABCDEFGHIJ')">🔤 Test 10 chars</button>
      <button class="qt-btn" id="qt4" disabled onclick="quickSend('El veloz murciélago hindú')">📏 Test largo</button>
      <button class="qt-btn" id="qt5" disabled onclick="sendPingPong()">🔁 Ping-Pong auto</button>
      <button class="qt-btn" id="qt6" disabled onclick="sendRawByte()">⚡ Byte 0xAA crudo</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="card">
    <div class="ch"><span class="d"></span> Mensajes</div>
    <div class="chat" id="chatArea">
      <div class="msg sys"><div class="bubble">Selecciona modo y conecta el dongle</div></div>
    </div>
    <div class="input-row">
      <input type="text" id="msgInput" placeholder="Escribe un mensaje..." disabled>
      <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <div class="ch"><span class="d"></span> Log técnico</div>
    <div class="log" id="logArea">
      <div class="info">→ Proyecto Ícaro · Test de comunicación</div>
    </div>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="document.getElementById('logArea').innerHTML=''">🗑️ Limpiar log</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
//  TEST DE COMUNICACIÓN — Modo Cable + Modo IR
//
//  CABLE: Ambos dongles a 9600 baud. Envío/recepción directa.
//         TX de uno → RX del otro (cruzar cables).
//         Protocolo: [0xAA] [0x55] [LEN] [DATA...] [XOR]
//
//  IR:    TX a 76800 (carrier 38kHz), RX a 1200 (VS1838B demodula).
//         Mismo protocolo pero modulado sobre carrier.
// ============================================================

const CH340_VID=0x1A86, CH340_PID=0x7523;
const CARRIER_ON=0x55, CARRIER_OFF=0xFF, US_PER_BYTE=130.208;
const BIT_PATTERN=[7,6,7,6,6,7,6,6,7,6];
const PREAMBLE_BYTES=Math.round(20000/US_PER_BYTE);

let device=null, rxActive=false, mode='cable';
let cntTx=0, cntRx=0, cntErr=0;
let autoPong=false;

// ============================================================
//  BAUD RATES
// ============================================================

const BAUD_REGS = {
  1200:   {f:0xB201, d:0x0038},
  2400:   {f:0xD901, d:0x0038},
  9600:   {f:0xB202, d:0x0038},
  19200:  {f:0xD902, d:0x0038},
  38400:  {f:0x6403, d:0x0038},
  76800:  {f:0xB203, d:0x0038},
  115200: {f:0xCC03, d:0x0038},
};

async function ch340Write(req,val,idx){
  await device.controlTransferOut({requestType:'vendor',recipient:'device',request:req,value:val,index:idx});
}

async function setBaud(rate){
  const b=BAUD_REGS[rate];if(!b)return;
  await ch340Write(0x9A,0x2518,b.f);
  await ch340Write(0x9A,0x0F2C,b.d);
  log('⚙️ Baud → '+rate,'info');
}

async function ch340Init(baud){
  await ch340Write(0xA1,0,0);
  await setBaud(baud);
  await ch340Write(0x9A,0x2518,0x00C3); // 8N1
  await ch340Write(0xA4,0x009F,0);      // DTR+RTS
}

// ============================================================
//  MODE MANAGEMENT
// ============================================================

function setMode(m){
  mode=m;
  document.getElementById('modeCable').className='mode-btn'+(m==='cable'?' active':'');
  document.getElementById('modeIR').className='mode-btn'+(m==='ir'?' active':'');

  if(m==='cable'){
    document.getElementById('modeInfo').innerHTML=
      '<strong>🔌 Cable directo</strong> — Ambos dongles a <strong>9600 baud</strong>.<br>'+
      'Conecta: TX₁↔RX₂, TX₂↔RX₁, GND₁↔GND₂.<br>'+
      'No necesita LED IR ni VS1838B. Ideal para verificar que el hardware y el software funcionan.';
    document.getElementById('modeInfo').className='info ok';
  } else {
    document.getElementById('modeInfo').innerHTML=
      '<strong>📡 Infrarrojo</strong> — TX a <strong>76800 baud</strong> (carrier 38kHz), RX a <strong>1200 baud</strong>.<br>'+
      'Apunta el LED IR del emisor al sensor VS1838B del receptor.<br>'+
      'Requiere el camino completo: LED → aire → VS1838B demodula → CH340G lee.';
    document.getElementById('modeInfo').className='info warn';
  }

  // If connected, reinit with correct baud
  if(device){
    rxActive=false;
    setTimeout(async()=>{
      try{
        const rxBaud = m==='cable' ? 9600 : 1200;
        await setBaud(rxBaud);
        startRx();
        log('♻️ Modo cambiado a '+(m==='cable'?'Cable 9600':'IR 1200'),'ok');
      }catch(e){log('❌ '+e.message,'err');}
    },100);
  }
}

// ============================================================
//  CONNECTION
// ============================================================

function setConnected(on){
  document.getElementById('connDot').className='dot '+(on?'on':'off');
  document.getElementById('connText').textContent=on?'OK':'Conectar';
  document.getElementById('msgInput').disabled=!on;
  document.getElementById('sendBtn').disabled=!on;
  document.querySelectorAll('.qt-btn').forEach(b=>b.disabled=!on);
  if(on){
    document.getElementById('statusBar').textContent='🟢 Escuchando...';
    document.getElementById('statusBar').className='status-bar listening';
  } else {
    document.getElementById('statusBar').textContent='Conecta el dongle';
    document.getElementById('statusBar').className='status-bar idle';
  }
}

async function toggleConnection(){
  if(device){
    rxActive=false;
    try{await device.releaseInterface(0);await device.close();}catch(e){}
    device=null;log('🔌 Desconectado','warn');setConnected(false);
  } else {
    if(!('usb' in navigator)){toast('Chrome Android necesario');return;}
    try{
      device=await navigator.usb.requestDevice({filters:[{vendorId:CH340_VID,productId:CH340_PID}]});
      await device.open();
      if(!device.configuration) await device.selectConfiguration(1);
      await device.claimInterface(0);
      const rxBaud = mode==='cable' ? 9600 : 1200;
      await ch340Init(rxBaud);
      log('✅ Conectado · RX a '+rxBaud+' baud','ok');
      setConnected(true);
      toast('Dongle conectado');
      addSysMsg('Conectado en modo '+(mode==='cable'?'Cable (9600)':'IR (1200)'));
      startRx();
    }catch(e){log('❌ '+e.message,'err');device=null;}
  }
}

// ============================================================
//  PROTOCOL: Frame [0xAA][0x55][LEN][DATA...][XOR]
// ============================================================

function buildFrameRaw(msgBytes){
  // Raw frame for cable mode — just the framed bytes at 9600 baud
  const buf = [0xAA, 0x55, msgBytes.length];
  let xor = 0;
  for(const b of msgBytes){ buf.push(b); xor ^= b; }
  buf.push(xor);
  return new Uint8Array(buf);
}

// IR mode: modulate frame over 38kHz carrier
function encode1200Byte(byte){
  const bits=[0];for(let i=0;i<8;i++)bits.push((byte>>i)&1);bits.push(1);
  const out=[];
  for(let i=0;i<10;i++){const c=BIT_PATTERN[i];const v=bits[i]===0?CARRIER_ON:CARRIER_OFF;
    for(let j=0;j<c;j++)out.push(v);}
  return out;
}

function buildFrameIR(msgBytes){
  const buf=[];
  for(let i=0;i<PREAMBLE_BYTES;i++)buf.push(CARRIER_ON);
  const sil=Math.round(2000/US_PER_BYTE);
  for(let i=0;i<sil;i++)buf.push(CARRIER_OFF);
  // Encode each protocol byte at 1200 baud over carrier
  const protocolBytes = [0xAA, 0x55, msgBytes.length];
  let xor=0;
  for(const b of msgBytes) xor^=b;
  protocolBytes.push(...msgBytes, xor);
  for(const b of protocolBytes) buf.push(...encode1200Byte(b));
  for(let i=0;i<20;i++)buf.push(CARRIER_OFF);
  return new Uint8Array(buf);
}

// ============================================================
//  TX
// ============================================================

async function transmit(msgBytes, label){
  if(!device) return;

  const statusBar = document.getElementById('statusBar');
  statusBar.textContent='📡 Enviando...';
  statusBar.className='status-bar sending';

  try{
    rxActive=false;
    await new Promise(r=>setTimeout(r,30));

    if(mode==='cable'){
      // Cable: send framed bytes at 9600 baud (already set)
      const frame=buildFrameRaw(msgBytes);
      await device.transferOut(2, frame);
      log('📤 TX Cable ['+frame.length+'B]: '+Array.from(frame).map(b=>b.toString(16).toUpperCase().padStart(2,'0')).join(' '),'ok');
    } else {
      // IR: switch to 76800, send modulated, switch back to 1200
      await setBaud(76800);
      await new Promise(r=>setTimeout(r,10));
      const frame=buildFrameIR(msgBytes);
      await device.transferOut(2, frame);
      log('📤 TX IR ['+frame.length+'B modulados]','ok');
      const txTime=frame.length*US_PER_BYTE/1000;
      await new Promise(r=>setTimeout(r,txTime+30));
      await setBaud(1200);
      await new Promise(r=>setTimeout(r,10));
    }

    cntTx++;
    updateCounters();
    if(label) addSentMsg(label);
    startRx();

  }catch(e){
    log('❌ TX: '+e.message,'err');
    cntErr++; updateCounters();
    try{
      const rxBaud=mode==='cable'?9600:1200;
      await setBaud(rxBaud);
      startRx();
    }catch(e2){}
  }finally{
    statusBar.textContent='🟢 Escuchando...';
    statusBar.className='status-bar listening';
  }
}

async function sendMessage(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text||!device) return;
  input.value='';
  const msgBytes=new TextEncoder().encode(text);
  await transmit(msgBytes, text);
}

async function quickSend(text){
  const msgBytes=new TextEncoder().encode(text);
  await transmit(msgBytes, text);
}

async function sendRawByte(){
  // Send single raw byte 0xAA for testing (no framing)
  if(!device)return;
  try{
    await device.transferOut(2, new Uint8Array([0xAA]));
    log('📤 Byte crudo 0xAA enviado','ok');
    addSentMsg('[raw: 0xAA]');
    cntTx++; updateCounters();
  }catch(e){log('❌ '+e.message,'err');}
}

async function sendPingPong(){
  autoPong = !autoPong;
  document.getElementById('qt5').textContent = autoPong ? '🛑 Parar auto-pong' : '🔁 Ping-Pong auto';
  if(autoPong){
    log('🔁 Auto-Pong activado: responde PONG a cada PING','info');
    addSysMsg('Auto-Pong activado');
  } else {
    log('⏹ Auto-Pong desactivado','warn');
    addSysMsg('Auto-Pong desactivado');
  }
}

// ============================================================
//  RX
// ============================================================

let syncState=0, frameLen=0, frameData=[];

function processRxByte(byte){
  switch(syncState){
    case 0: if(byte===0xAA){syncState=1;} break;
    case 1: if(byte===0x55){syncState=2;frameData=[];}
            else if(byte!==0xAA){syncState=0;} break;
    case 2: frameLen=byte;
            if(frameLen===0||frameLen>200){syncState=0;log('⚠️ Len inválido: '+frameLen,'warn');cntErr++;updateCounters();}
            else{syncState=3;frameData=[];} break;
    case 3: frameData.push(byte);
            if(frameData.length===frameLen+1){
              let xor=0;
              for(let i=0;i<frameLen;i++) xor^=frameData[i];
              if(xor===frameData[frameLen]){
                const text=new TextDecoder().decode(new Uint8Array(frameData.slice(0,frameLen)));
                log('✅ RX: "'+text+'" ('+frameLen+' bytes, checksum OK)','ok');
                cntRx++; updateCounters();
                addRecvMsg(text);
                if(navigator.vibrate) navigator.vibrate(100);
                // Auto-pong
                if(autoPong && text==='PING'){
                  setTimeout(()=>quickSend('PONG'),300);
                }
              } else {
                log('❌ Checksum: esperado 0x'+xor.toString(16)+' recibido 0x'+frameData[frameLen].toString(16),'err');
                cntErr++; updateCounters();
              }
              syncState=0;
            } break;
  }
}

async function startRx(){
  rxActive=true;
  while(rxActive&&device){
    try{
      const r=await device.transferIn(2,64);
      if(r.data&&r.data.byteLength>0){
        const arr=new Uint8Array(r.data.buffer);
        const hex=Array.from(arr).map(b=>b.toString(16).toUpperCase().padStart(2,'0')).join(' ');
        log('📥 RX raw ['+arr.length+'B]: '+hex,'info');
        for(const b of arr) processRxByte(b);
      }
    }catch(e){
      if(rxActive&&e.message&&!e.message.includes('timed')&&!e.message.includes('transfer')){
        log('RX: '+e.message,'err');break;
      }
    }
  }
}

// ============================================================
//  UI
// ============================================================

function updateCounters(){
  document.getElementById('cntTx').textContent=cntTx;
  document.getElementById('cntRx').textContent=cntRx;
  document.getElementById('cntErr').textContent=cntErr;
}

function getTime(){return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}

function addSentMsg(text){
  const a=document.getElementById('chatArea');
  a.innerHTML+=`<div class="msg sent"><div class="bubble">${esc(text)}<span class="time">${getTime()} · enviado</span></div></div>`;
  a.scrollTop=a.scrollHeight;
}
function addRecvMsg(text){
  const a=document.getElementById('chatArea');
  a.innerHTML+=`<div class="msg recv"><div class="bubble">${esc(text)}<span class="time">${getTime()} · recibido</span></div></div>`;
  a.scrollTop=a.scrollHeight;
}
function addSysMsg(text){
  const a=document.getElementById('chatArea');
  a.innerHTML+=`<div class="msg sys"><div class="bubble">${esc(text)}</div></div>`;
  a.scrollTop=a.scrollHeight;
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);}
function log(msg,type=''){const a=document.getElementById('logArea');const l=document.createElement('div');
  if(type)l.className=type;l.textContent='['+getTime()+'] '+msg;a.appendChild(l);a.scrollTop=a.scrollHeight;}

document.getElementById('msgInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();sendMessage();}
});

// Init
setMode('cable');
window.addEventListener('DOMContentLoaded',()=>{
  if(!('usb' in navigator)){log('⚠️ WebUSB no disponible','err');addSysMsg('❌ Necesitas Chrome en Android');}
  else log('✅ WebUSB disponible','ok');
});
window.addEventListener('beforeunload',()=>{rxActive=false;if(device)try{device.releaseInterface(0);device.close();}catch(e){}});
</script>
</body>
</html>
