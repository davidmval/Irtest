<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Proyecto Ícaro — Chat IR</title>
<meta name="theme-color" content="#08080f">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080f;--surface:rgba(255,255,255,0.05);--surface2:rgba(255,255,255,0.08);
--surface3:rgba(255,255,255,0.12);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
--text:#eaeaf2;--dim:#7a7a96;--mid:#a0a0b8;--accent:#6366f1;--accent2:#818cf8;
--aglow:rgba(99,102,241,0.35);--green:#34d399;--gglow:rgba(52,211,153,0.25);
--red:#f87171;--rglow:rgba(248,113,113,0.25);--orange:#fbbf24;--cyan:#22d3ee;
--rad:18px;--radsm:12px;--sent:#1e3a5f;--recv:#2d1b4e}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;
display:flex;flex-direction:column}
.bg-orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-orbs span{position:absolute;border-radius:50%;filter:blur(90px);opacity:.25}
.bg-orbs .o1{width:300px;height:300px;background:#6366f1;top:-80px;right:-60px;animation:of 16s ease-in-out infinite alternate}
.bg-orbs .o2{width:240px;height:240px;background:#ec4899;bottom:20%;left:-80px;animation:of 20s ease-in-out infinite alternate-reverse}
@keyframes of{0%{transform:translate(0,0) scale(1)}100%{transform:translate(20px,25px) scale(1.1)}}

/* Header */
.top-bar{position:sticky;top:0;z-index:50;background:rgba(8,8,15,.9);backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;
display:flex;align-items:center;gap:12px}
.top-bar h1{font-size:18px;font-weight:700;flex:1;
background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px;
background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.conn-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;
background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:all .15s;
font-size:12px;font-weight:500}
.conn-chip:active{transform:scale(.96)}
.conn-chip .dot{width:8px;height:8px;border-radius:50%;transition:all .3s}
.conn-chip .dot.off{background:var(--red);box-shadow:0 0 6px var(--rglow)}
.conn-chip .dot.on{background:var(--green);box-shadow:0 0 6px var(--gglow);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:16px;padding-bottom:90px;
position:relative;z-index:1;max-width:500px;margin:0 auto;width:100%}

.msg{display:flex;margin-bottom:12px;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.sent{justify-content:flex-end}
.msg.recv{justify-content:flex-start}
.bubble{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;
position:relative;word-break:break-word}
.msg.sent .bubble{background:var(--sent);border-bottom-right-radius:4px;color:#c5ddf5}
.msg.recv .bubble{background:var(--recv);border-bottom-left-radius:4px;color:#dcc5f0}
.bubble .time{display:block;font-size:10px;color:var(--dim);margin-top:4px;text-align:right}

.msg.system{justify-content:center}
.msg.system .bubble{background:var(--surface2);color:var(--dim);font-size:12px;
border-radius:20px;padding:6px 14px;max-width:90%}

/* Status bar */
.status-bar{padding:6px 16px;text-align:center;font-size:11px;color:var(--dim);
font-weight:500;position:relative;z-index:1}
.status-bar.listening{color:var(--green)}
.status-bar.sending{color:var(--cyan)}

/* Input area */
.input-area{position:fixed;bottom:0;left:0;right:0;z-index:50;
background:rgba(8,8,15,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-top:1px solid var(--border);padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
display:flex;gap:8px;align-items:flex-end}
.input-area textarea{flex:1;background:var(--surface2);border:1px solid var(--border);
border-radius:20px;padding:10px 16px;color:var(--text);font-family:'Outfit';font-size:14px;
resize:none;outline:none;max-height:100px;line-height:1.4;min-height:40px}
.input-area textarea::placeholder{color:var(--dim)}
.send-btn{width:44px;height:44px;border-radius:50%;border:none;
background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:20px;
cursor:pointer;display:flex;align-items:center;justify-content:center;
box-shadow:0 4px 16px var(--aglow);transition:all .15s;flex-shrink:0}
.send-btn:active{transform:scale(.9)}
.send-btn:disabled{opacity:.3;pointer-events:none}

/* Log panel */
.log-panel{position:fixed;bottom:70px;left:8px;right:8px;z-index:40;
background:rgba(0,0,0,.85);backdrop-filter:blur(16px);border:1px solid var(--border);
border-radius:var(--radsm);max-height:200px;overflow-y:auto;padding:10px;
font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.6;
color:var(--dim);display:none}
.log-panel.show{display:block}
.log-panel .log-ok{color:var(--green)}.log-panel .log-err{color:var(--red)}
.log-panel .log-warn{color:var(--orange)}.log-panel .log-info{color:var(--cyan)}

.log-toggle{position:fixed;bottom:70px;right:12px;z-index:45;width:36px;height:36px;
border-radius:50%;background:var(--surface3);border:1px solid var(--border);color:var(--dim);
font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Toast */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);
background:var(--surface3);backdrop-filter:blur(20px);border:1px solid var(--border2);
border-radius:12px;padding:8px 18px;font-size:12px;font-weight:500;color:var(--text);
z-index:200;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="bg-orbs"><span class="o1"></span><span class="o2"></span></div>

<div class="top-bar">
  <h1>💬 Chat IR</h1>
  <span class="top-badge">Proyecto Ícaro</span>
  <div class="conn-chip" id="connChip" onclick="toggleConnection()">
    <span class="dot off" id="connDot"></span>
    <span id="connText">Conectar</span>
  </div>
</div>

<div class="status-bar" id="statusBar">Conecta el dongle para empezar</div>

<div class="chat-area" id="chatArea">
  <div class="msg system">
    <div class="bubble">Bienvenido al Chat IR · Conecta tu dongle USB-C y empieza a enviar mensajes por infrarrojo</div>
  </div>
</div>

<button class="log-toggle" id="logToggle" onclick="toggleLog()">📋</button>
<div class="log-panel" id="logPanel"></div>

<div class="input-area">
  <textarea id="msgInput" placeholder="Escribe un mensaje..." rows="1" disabled></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
//  PROYECTO ÍCARO — CHAT IR
//  Comunicación texto entre dos móviles via IR (38kHz modulado)
//
//  TX: 76800 baud → 0x55 = carrier ON, 0xFF = carrier OFF
//       Cada byte del mensaje se codifica como frame UART 1200 baud
//       modulado sobre carrier 38kHz
//  RX: 1200 baud → VS1838B demodula → UART limpio a 1200 baud
//
//  Protocolo de frame:
//    [PREAMBLE 20ms carrier] [SYNC 0xAA 0x55] [LEN] [DATA...] [XOR checksum]
// ============================================================

const CH340_VID = 0x1A86, CH340_PID = 0x7523;
const CARRIER_ON = 0x55, CARRIER_OFF = 0xFF;
const US_PER_BYTE = 130.208;  // at 76800 baud

// 1200-baud bit pattern: 10 bit periods = 64 bytes at 76800 baud
// Pattern [7,6,7,6,6,7,6,6,7,6] = 64 bytes = 8333µs = exactly 10/1200
const BIT_PATTERN = [7, 6, 7, 6, 6, 7, 6, 6, 7, 6];

// Preamble: 20ms carrier for AGC warmup
const PREAMBLE_BYTES = Math.round(20000 / US_PER_BYTE);  // ~154

let device = null;
let rxActive = false;
let rxBuffer = [];
let syncState = 0; // 0=waiting for 0xAA, 1=waiting for 0x55, 2=waiting for len, 3=reading data
let frameLen = 0;
let frameData = [];

// ============================================================
//  Encoder: message byte → 1200-baud-over-carrier at 76800 baud
// ============================================================

function encode1200Byte(byte) {
  // UART 1200 baud frame: start(0) + 8 data bits (LSB first) + stop(1)
  const bits = [0]; // start bit = 0
  for (let i = 0; i < 8; i++) bits.push((byte >> i) & 1); // data LSB first
  bits.push(1); // stop bit = 1

  const out = [];
  for (let i = 0; i < 10; i++) {
    const count = BIT_PATTERN[i];
    const val = bits[i] === 0 ? CARRIER_ON : CARRIER_OFF;
    // bit 0 (space) → carrier ON → VS1838B output LOW → RX sees 0 ✓
    // bit 1 (mark)  → carrier OFF → VS1838B output HIGH → RX sees 1 ✓
    for (let j = 0; j < count; j++) out.push(val);
  }
  return out;  // 64 bytes per character
}

function buildFrame(message) {
  const buf = [];

  // 1. Preamble: sustained carrier for AGC warmup (20ms)
  for (let i = 0; i < PREAMBLE_BYTES; i++) buf.push(CARRIER_ON);

  // 2. Brief silence to mark end of preamble (2ms)
  const silenceBytes = Math.round(2000 / US_PER_BYTE);
  for (let i = 0; i < silenceBytes; i++) buf.push(CARRIER_OFF);

  // 3. Encode sync bytes at 1200 baud
  buf.push(...encode1200Byte(0xAA));
  buf.push(...encode1200Byte(0x55));

  // 4. Encode length byte
  const msgBytes = new TextEncoder().encode(message);
  const len = Math.min(msgBytes.length, 200);
  buf.push(...encode1200Byte(len));

  // 5. Encode data bytes
  let xor = 0;
  for (let i = 0; i < len; i++) {
    buf.push(...encode1200Byte(msgBytes[i]));
    xor ^= msgBytes[i];
  }

  // 6. Encode checksum
  buf.push(...encode1200Byte(xor));

  // 7. Trail silence (stop carrier, let line go idle)
  for (let i = 0; i < 20; i++) buf.push(CARRIER_OFF);

  return new Uint8Array(buf);
}

// ============================================================
//  WebUSB CH340G Driver
// ============================================================

async function ch340Write(req, val, idx) {
  await device.controlTransferOut({requestType:'vendor',recipient:'device',request:req,value:val,index:idx});
}

async function setBaud(rate) {
  const rates = {
    1200:  { f:0xB201, d:0x0038 },
    2400:  { f:0xD901, d:0x0038 },
    9600:  { f:0xB202, d:0x0038 },
    38400: { f:0x6403, d:0x0038 },
    76800: { f:0xB203, d:0x0038 },
  };
  const b = rates[rate];
  if (!b) throw new Error('Unsupported baud: ' + rate);
  await ch340Write(0x9A, 0x2518, b.f);
  await ch340Write(0x9A, 0x0F2C, b.d);
  log('⚙️ Baud → ' + rate, 'info');
}

async function ch340Init() {
  await ch340Write(0xA1, 0, 0);           // serial init
  await setBaud(1200);                     // start in RX mode at 1200
  await ch340Write(0x9A, 0x2518, 0x00C3); // LCR 8N1
  await ch340Write(0xA4, 0x009F, 0);      // modem ctrl
}

// ============================================================
//  Connection
// ============================================================

function setConnected(on) {
  document.getElementById('connDot').className = 'dot ' + (on ? 'on' : 'off');
  document.getElementById('connText').textContent = on ? 'OK' : 'Conectar';
  document.getElementById('msgInput').disabled = !on;
  document.getElementById('sendBtn').disabled = !on;
  document.getElementById('statusBar').textContent = on ? '🟢 Escuchando mensajes IR...' : 'Conecta el dongle para empezar';
  if (on) document.getElementById('statusBar').className = 'status-bar listening';
  else document.getElementById('statusBar').className = 'status-bar';
}

async function toggleConnection() {
  if (device) {
    rxActive = false;
    try { await device.releaseInterface(0); await device.close(); } catch(e) {}
    device = null;
    log('🔌 Desconectado', 'warn');
    setConnected(false);
    addSystemMsg('Dongle desconectado');
  } else {
    if (!('usb' in navigator)) {
      toast('Necesitas Chrome en Android'); return;
    }
    try {
      device = await navigator.usb.requestDevice({filters:[{vendorId:CH340_VID,productId:CH340_PID}]});
      await device.open();
      if (!device.configuration) await device.selectConfiguration(1);
      await device.claimInterface(0);
      await ch340Init();
      log('✅ Conectado · 1200 baud RX · Listo', 'ok');
      setConnected(true);
      addSystemMsg('Dongle conectado · Escuchando a 1200 baud');
      toast('Conectado');
      startRx();
    } catch(e) {
      log('❌ ' + e.message, 'err');
      device = null;
    }
  }
}

// ============================================================
//  RX: Receive messages
// ============================================================

function processRxByte(byte) {
  switch (syncState) {
    case 0: // waiting for 0xAA
      if (byte === 0xAA) { syncState = 1; log('🔎 Sync: got 0xAA', 'info'); }
      break;
    case 1: // waiting for 0x55
      if (byte === 0x55) { syncState = 2; frameData = []; log('🔎 Sync: got 0x55 ✓', 'ok'); }
      else if (byte === 0xAA) { syncState = 1; } // still in sync
      else { syncState = 0; }
      break;
    case 2: // waiting for length
      frameLen = byte;
      if (frameLen === 0 || frameLen > 200) { syncState = 0; log('⚠️ Invalid len: ' + frameLen, 'warn'); }
      else { syncState = 3; frameData = []; log('📦 Frame len: ' + frameLen, 'info'); }
      break;
    case 3: // reading data + checksum
      frameData.push(byte);
      if (frameData.length === frameLen + 1) { // +1 for checksum
        // Verify checksum
        let xor = 0;
        for (let i = 0; i < frameLen; i++) xor ^= frameData[i];
        const rxXor = frameData[frameLen];
        if (xor === rxXor) {
          const text = new TextDecoder().decode(new Uint8Array(frameData.slice(0, frameLen)));
          log('✅ Mensaje recibido: "' + text + '"', 'ok');
          addRecvMsg(text);
          toast('Mensaje recibido');
        } else {
          log('❌ Checksum error: expected 0x' + xor.toString(16) + ' got 0x' + rxXor.toString(16), 'err');
        }
        syncState = 0;
      }
      break;
  }
}

async function startRx() {
  rxActive = true;
  syncState = 0;
  log('👂 RX activo a 1200 baud', 'info');

  while (rxActive && device) {
    try {
      const result = await device.transferIn(2, 64);
      if (result.data && result.data.byteLength > 0) {
        const arr = new Uint8Array(result.data.buffer);
        const hex = Array.from(arr).map(b => b.toString(16).toUpperCase().padStart(2,'0')).join(' ');
        log('📥 RX: ' + hex, 'info');
        for (const byte of arr) processRxByte(byte);
      }
    } catch(e) {
      if (rxActive && e.message && !e.message.includes('timed out') && !e.message.includes('transfer')) {
        log('RX error: ' + e.message, 'err');
        break;
      }
    }
  }
}

// ============================================================
//  TX: Send message
// ============================================================

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !device) return;

  input.value = '';
  autoResize(input);
  document.getElementById('statusBar').textContent = '📡 Enviando...';
  document.getElementById('statusBar').className = 'status-bar sending';
  document.getElementById('sendBtn').disabled = true;

  try {
    // Stop RX temporarily
    rxActive = false;
    await new Promise(r => setTimeout(r, 50));

    // Switch to 76800 baud for TX
    await setBaud(76800);
    await new Promise(r => setTimeout(r, 20));

    // Build and send frame
    const frame = buildFrame(text);
    log('📤 TX: "' + text + '" · ' + frame.length + ' bytes modulados', 'ok');

    await device.transferOut(2, frame);

    // Wait for frame to finish transmitting
    const txTime = frame.length * US_PER_BYTE / 1000;
    await new Promise(r => setTimeout(r, txTime + 50));

    addSentMsg(text);
    log('✅ Mensaje enviado', 'ok');

    // Switch back to 1200 baud for RX
    await setBaud(1200);
    await new Promise(r => setTimeout(r, 20));

    // Resume RX
    startRx();

  } catch(e) {
    log('❌ TX error: ' + e.message, 'err');
    toast('Error al enviar');
    // Try to recover RX
    try {
      await setBaud(1200);
      startRx();
    } catch(e2) {}
  } finally {
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('statusBar').textContent = '🟢 Escuchando mensajes IR...';
    document.getElementById('statusBar').className = 'status-bar listening';
  }
}

// ============================================================
//  UI
// ============================================================

function getTime() {
  return new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
}

function addSentMsg(text) {
  const area = document.getElementById('chatArea');
  area.innerHTML += `<div class="msg sent"><div class="bubble">${escHtml(text)}<span class="time">${getTime()} · enviado</span></div></div>`;
  area.scrollTop = area.scrollHeight;
}

function addRecvMsg(text) {
  const area = document.getElementById('chatArea');
  area.innerHTML += `<div class="msg recv"><div class="bubble">${escHtml(text)}<span class="time">${getTime()} · recibido via IR</span></div></div>`;
  area.scrollTop = area.scrollHeight;
  // Vibrate if available
  if (navigator.vibrate) navigator.vibrate(200);
}

function addSystemMsg(text) {
  const area = document.getElementById('chatArea');
  area.innerHTML += `<div class="msg system"><div class="bubble">${escHtml(text)}</div></div>`;
  area.scrollTop = area.scrollHeight;
}

function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function log(msg, type='') {
  const p = document.getElementById('logPanel');
  const l = document.createElement('div');
  if (type) l.className = 'log-' + type;
  const now = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  l.textContent = '[' + now + '] ' + msg;
  p.appendChild(l);
  p.scrollTop = p.scrollHeight;
}

function toggleLog() {
  document.getElementById('logPanel').classList.toggle('show');
}

// Auto-resize textarea
const input = document.getElementById('msgInput');
input.addEventListener('input', () => autoResize(input));
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// Init
window.addEventListener('DOMContentLoaded', () => {
  if (!('usb' in navigator)) {
    log('❌ WebUSB no disponible. Usa Chrome en Android.', 'err');
    addSystemMsg('⚠️ WebUSB no disponible. Necesitas Chrome en Android con HTTPS.');
  } else {
    log('✅ WebUSB disponible', 'ok');
    log('📊 Bytes por carácter 1200 baud: 64 (a 76800)', 'info');
    log('📊 Throughput estimado: ~120 bytes/s', 'info');
  }
});

window.addEventListener('beforeunload', () => {
  rxActive = false;
  if (device) { try { device.releaseInterface(0); device.close(); } catch(e) {} }
});
</script>
</body>
</html>
